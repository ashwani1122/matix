<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Sum Game</title>

  <style>
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: red;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
    }
  </style>

  <script>
  const ws = new WebSocket("ws://localhost:3000");

  let sum = 0;
  let timer = null;

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: "generate" }));
  };

  ws.onmessage = (event) => {
    const message = JSON.parse(event.data);

    if (message.type === "numbers") {
      const data = message.data;

      const container = document.getElementById("output");
      container.innerHTML = "";

      sum = 0;

      data.forEach((num) => {
        const p = document.createElement("p");
        p.innerText = num;

        sum += num;

        p.style.color = "white";
        p.style.fontSize = "20px";
        p.style.border = "2px solid black";
        p.style.padding = "20px";
        p.style.backgroundColor = "blue";

        container.appendChild(p);
      });

      document.getElementById("result").value = "";
    }
  };

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display = "block";

    setTimeout(() => {
      toast.style.display = "none";
    }, 1500);
  }

  function handleInput(value) {
    const num = Number(value);

    // clear previous timer
    clearTimeout(timer);

    if (!value) return;

    // ✅ correct → instant
    if (num === sum) {
      ws.send(JSON.stringify({ type: "generate" }));
      return;
    }

    // ⏳ wait before showing error
    timer = setTimeout(() => {
      if (num < sum) {
        showToast("❌ Incorrect (too low)");
      } else if (num > sum) {
        showToast("❌ Incorrect (too high)");
      }
    }, 400); // adjust delay here
  }
</script>
</head>

<body style="background-color: rgb(12, 12, 26); display: flex; flex-direction: column;">
  
  <div id="output"></div>

  <!-- 🔥 oninput instead of onchange -->
  <input 
    oninput="handleInput(this.value)" 
    id="result" 
    placeholder="enter result" 
    type="number"
  >

  <div id="toast"></div>

</body>
</html>
