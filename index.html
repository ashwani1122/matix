<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Sum Game</title>

  <style>
    .input-box {
    width: 260px;
    padding: 12px 16px;
    font-size: 18px;
    border-radius: 12px;
    border: 2px solid transparent;
    outline: none;
    background: #1e1e2f;
    color: white;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .input-box::placeholder {
    color: #aaa;
  }

  .input-box:focus {
    border: 2px solid #4f9cff;
    box-shadow: 0 0 10px #4f9cff;
  }
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: red;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
    }
    .container{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }
  </style>

  <script>
  const ws = new WebSocket("ws://localhost:3000");

  ws.onopen = () => {
    console.log("Connected");
  };

  ws.onmessage = (event) => {
    const message = JSON.parse(event.data);
    if (message.type == 'game_update') {
      renderNumbers(message.numbers);
    }

    if (message.type === "wrong") {
      showToast("❌ Incorrect!");
    }
  };

  function renderNumbers(data) {
    const container = document.getElementById("output");
    container.innerHTML = "";

    data.forEach((num) => {
      const p = document.createElement("p");
      p.innerText = num;

      p.style.color = "white";
      p.style.fontSize = "20px";
      p.style.border = "2px solid black";
      p.style.padding = "20px";
      p.style.backgroundColor = "blue";

      container.appendChild(p);
    });

    document.getElementById("result").value = "";
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display = "block";

    setTimeout(() => {
      toast.style.display = "none";
    }, 1500);
  }

  let debounceTimer = null;

  function handleInput(value) {
    if (!value) return;

    const num = Number(value);

    // 🔥 clear previous timer
    clearTimeout(debounceTimer);

    // ⏳ debounce sending answer
    debounceTimer = setTimeout(() => {
      ws.send(JSON.stringify({
        type: "answer",
        value: num
      }));
    }, 400); // adjust delay (300–600ms)
  }</script>
</head>

<body style="background-color: rgb(12, 12, 26); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
  
  <div style="border:1px solid white; height: 200px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px; border-radius: 20px;"><div class="container" style="display: flex;" id="output"></div>
  <div id="leaderboard"></div>

  <!-- 🔥 oninput instead of onchange -->
  <input 
  oninput="handleInput(this.value)" 
  id="result" 
  placeholder="Enter result..." 
  class="input-box"
/>
</div>
  <div id="toast"></div>

</body>
</html>
