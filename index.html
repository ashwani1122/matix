<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
  const ws = new WebSocket("ws://localhost:3000");
  let add = ""
  let sum = 0;

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    const container = document.getElementById("output");
    add = document.getElementById("result");

    container.innerHTML = "";

    data.forEach((num) => {
      const p = document.createElement("p");
      p.innerText = num;
      sum += num;

      p.style.color = "white";
      p.style.fontSize = "20px";
      p.style.border = "2px solid black";
      p.style.padding = "20px";
      p.style.backgroundColor = "blue";

      container.appendChild(p);
    });

    
  };

  function calculat() {
    alert("Input: " + add.value);
    alert("Sum: " + sum);

    if (Number(add.value) === sum) {
      alert("✅ Correct!");
    } else {
      alert("❌ Wrong!");
    }
  }
</script>
</head>
<body style="background-color: rgb(12, 12, 26); display: flex; flex-direction: column; align-content: center; justify-items: center;">
    
   <div id="output"></div>

<input id="result" placeholder="enter result" type="text">
<button onclick="calculat()" type="button">submit</button>

</html>
